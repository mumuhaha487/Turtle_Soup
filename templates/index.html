<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>海龟汤 - 沉浸式推理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        /* Specific overrides for SPA sections */
        .chat-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 1.5rem;
            height: calc(100vh - 140px);
        }

        @media (max-width: 768px) {
            .chat-layout {
                grid-template-columns: 1fr;
                height: auto;
                gap: 0.75rem;
            }
            .chat-container {
                height: 65dvh;
                min-height: 380px;
            }
            .chat-messages {
                padding: 0.75rem;
            }
            .chat-input-area {
                padding: 0.6rem;
                gap: 0.35rem;
                flex-wrap: nowrap;
                align-items: center;
            }
            .chat-input-area textarea {
                font-size: 15px !important;
                padding: 0.5rem !important;
                min-height: 38px !important;
            }
            .chat-input-area .btn {
                padding: 0.45rem 0.65rem !important;
                font-size: 0.85rem !important;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .chat-input-area .btn .iconify {
                font-size: 1rem !important;
            }
            .bubble {
                max-width: 90% !important;
                padding: 0.65rem 0.8rem !important;
                font-size: 0.9rem;
            }
            .msg-nickname {
                font-size: 0.7rem !important;
            }
            #restore-story-btn {
                padding: 0.45rem 0.55rem !important;
            }
            /* 移动端侧边栏默认折叠，只显示切换按钮 */
            .mobile-sidebar-toggle {
                display: flex !important;
            }
            .mobile-sidebar-inner {
                display: none;
            }
            .mobile-sidebar-inner.open {
                display: flex;
            }
            .user-list-panel {
                padding: 0.6rem;
                font-size: 0.85rem;
            }
            #chat-box-chat {
                min-height: 80px;
                max-height: 150px;
            }
            .container {
                padding: 0.75rem;
            }
            header {
                padding: 0.75rem 0;
                margin-bottom: 1rem;
            }
            h1 { font-size: 1.8rem; }
            .card { padding: 1.2rem; }
            #current-story {
                padding: 0.6rem !important;
                font-size: 0.85rem;
            }
            #room-info-text {
                font-size: 0.75rem !important;
            }
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: #f9fafb;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .bubble {
            max-width: 80%;
            padding: 1rem;
            border-radius: var(--radius-md);
            position: relative;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--color-primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .msg-ai {
            align-self: flex-start;
            background: white;
            border: 1px solid #e5e7eb;
            color: var(--color-text-primary);
            border-bottom-left-radius: 2px;
        }
        
        .msg-nickname {
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
            display: block;
            opacity: 0.8;
        }

        .chat-input-area {
            padding: 1rem;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 0.75rem;
        }

        .user-list-panel {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            padding: 1rem;
            /* Height handled by flex in parent */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: var(--radius-sm);
        }
        
        .user-item:hover {
            background: #f3f4f6;
        }

        /* Hero styles */
        .hero-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }
        
        @media (max-width: 768px) {
            .hero-wrapper {
                flex-direction: column-reverse;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <div class="logo">
                <span class="iconify" data-icon="lucide:turtle" style="color: var(--color-primary);"></span>
                <span>海龟汤 AI</span>
            </div>
            <!-- Admin Link Hidden -->
            <!-- <nav>
                <a href="/admin/login" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                    <span class="iconify" data-icon="lucide:shield"></span> 管理员
                </a>
            </nav> -->
        </header>

        <!-- PAGE: HOME -->
        <div id="page-home" class="page-section" style="display: block;">
            <div id="announcement-banner" style="background: #fffbe6; border: 1px solid #fde68a; border-radius: 10px; padding: 10px 16px; margin-bottom: 1.5rem; display: none; position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div style="display: flex; align-items: flex-start; gap: 8px;">
                        <span class="iconify" data-icon="lucide:megaphone" style="color: #d97706; font-size: 1.2rem; flex-shrink: 0; margin-top: 1px;"></span>
                        <div id="announcement-text" style="font-size: 0.95rem; color: #92400e; line-height: 1.6; white-space: pre-wrap;"></div>
                    </div>
                    <button onclick="document.getElementById('announcement-banner').style.display='none'" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; color: #92400e; padding: 0 4px; line-height: 1;">×</button>
                </div>
            </div>
            <div class="hero-wrapper">
                <div style="flex: 1;">
                    <h1 style="font-size: 3rem; margin-bottom: 1.5rem;">
                        <span style="color: var(--color-primary);">海龟汤</span><br>
                        AI 沉浸式推理
                    </h1>
                    <p style="font-size: 1.2rem; color: var(--color-text-secondary); margin-bottom: 2.5rem; max-width: 500px;">
                        与高智商 AI 主持人博弈，在有限的线索中还原惊悚、悬疑或温馨的故事真相。
                    </p>
                    
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                        <button class="btn" onclick="showPage('create')" style="padding: 1rem 2rem; font-size: 1.1rem;">
                            <span class="iconify" data-icon="lucide:plus-circle"></span> 创建房间
                        </button>
                        <button class="btn btn-secondary" onclick="showPage('join')" style="padding: 1rem 2rem; font-size: 1.1rem;">
                            <span class="iconify" data-icon="lucide:log-in"></span> 加入房间
                        </button>
                    </div>
                    
                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button class="btn btn-secondary" onclick="window.location.href='/story_plaza'">
                            <span class="iconify" data-icon="lucide:library"></span> 故事广场
                        </button>
                        <button class="btn btn-secondary" onclick="window.location.href='/story_plaza#edit'">
                            <span class="iconify" data-icon="lucide:edit"></span> 管理我的故事
                        </button>
                    </div>
                </div>
                
                <div style="flex: 1; display: flex; justify-content: center;">
                    <img src="{{ url_for('static', filename='images/leimiule.gif') }}" alt="Illustration" class="undraw-img" style="max-width: 100%; height: auto;">
                </div>
            </div>
        </div>

        <!-- PAGE: CREATE ROOM -->
        <div id="page-create" class="page-section" style="max-width: 500px; margin: 0 auto; display: none;">
            <div class="card">
                <h3><span class="iconify" data-icon="lucide:plus-square"></span> 创建房间</h3>
                <div class="form-group">
                    <label>你的昵称</label>
                    <input type="text" id="create-nickname" maxlength="16" placeholder="例如：福尔摩斯">
                </div>
                
                <details style="margin-bottom: 1.5rem;">
                    <summary style="cursor: pointer; color: var(--color-text-secondary); margin-bottom: 1rem;">高级 API 设置</summary>
                    <div style="margin-bottom: 1rem;">
                        <label style="display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;">
                            <span style="display: flex; align-items: center; gap: 0.35rem;">
                                <input type="radio" name="api-mode" value="default" checked onchange="toggleApiMode()">
                                <span>默认配置（推荐）</span>
                            </span>
                            <span style="display: flex; align-items: center; gap: 0.35rem;">
                                <input type="radio" name="api-mode" value="custom" onchange="toggleApiMode()">
                                <span>自定义配置</span>
                            </span>
                        </label>
                        <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem;">默认模式：使用服务器预设的 API，只需选择模型</div>
                    </div>
                    <div id="api-default-group">
                        <div class="form-group">
                            <label>模型</label>
                            <select id="create-model-select" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: var(--radius-sm);">
                                <option value="">请选择模型</option>
                            </select>
                        </div>
                    </div>
                    <div id="api-custom-group" style="display: none;">
                        <div class="form-group">
                            <label>代理地址 (Base URL)</label>
                            <input type="password" id="create-base-url" placeholder="例如：https://api.example.com/v1" style="width: 100%;">
                        </div>
                        <div class="form-group">
                            <label>API Key</label>
                            <input type="password" id="create-api-key" placeholder="sk-..." style="width: 100%;">
                        </div>
                        <div class="form-group">
                            <label>模型</label>
                            <input type="text" id="create-model" placeholder="例如：gpt-4o" style="width: 100%;">
                        </div>
                    </div>
                </details>

                <div style="display: flex; gap: 1rem;">
                    <button class="btn" id="create-room-btn" style="flex: 1; justify-content: center;">创建并进入</button>
                    <button class="btn btn-secondary" onclick="showPage('home')">返回</button>
                </div>
                <div id="create-error" style="color: var(--color-danger); margin-top: 1rem; text-align: center;"></div>
            </div>
        </div>

        <!-- PAGE: JOIN ROOM -->
        <div id="page-join" class="page-section" style="max-width: 500px; margin: 0 auto; display: none;">
            <div class="card">
                <h3><span class="iconify" data-icon="lucide:log-in"></span> 加入房间</h3>
                <div class="form-group">
                    <label>你的昵称</label>
                    <input type="text" id="join-nickname" maxlength="16" placeholder="例如：华生">
                </div>
                <div class="form-group">
                    <label>房间邀请码</label>
                    <input type="text" id="join-code" maxlength="8" placeholder="例如：ABC12345" style="text-transform: uppercase;">
                </div>
                
                <div style="display: flex; gap: 1rem;">
                    <button class="btn" id="join-room-btn" style="flex: 1; justify-content: center;">加入游戏</button>
                    <button class="btn btn-secondary" onclick="showPage('home')">返回</button>
                </div>
                <div id="join-error" style="color: var(--color-danger); margin-top: 1rem; text-align: center;"></div>
            </div>
        </div>

        <!-- PAGE: CHAT (GAME) -->
        <div id="page-chat" class="page-section" style="display: none;">
            <div class="chat-layout">
                <!-- Left: Main Chat -->
                <div style="display: flex; flex-direction: column; gap: 1rem; height: 100%;">
                    <!-- Room Header Info -->
                    <div style="background: white; padding: 1rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <span style="color: var(--color-text-secondary); font-size: 0.9rem;">邀请码</span>
                            <span id="invite-code" style="font-weight: 700; font-size: 1.2rem; margin-left: 0.5rem; color: var(--color-primary); letter-spacing: 1px;"></span>
                        </div>
                        <div id="room-info-text" style="font-size: 0.9rem; color: var(--color-text-secondary);"></div>
                        <button class="btn btn-secondary" onclick="leaveRoom()" style="padding: 0.5rem;">
                            <span class="iconify" data-icon="lucide:log-out"></span> 退出
                        </button>
                    </div>

                    <!-- Current Story Info (Collapsible or Card) -->
                    <div id="current-story" style="background: white; padding: 1rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm);">
                        <!-- Story content injected by JS -->
                    </div>

                    <!-- Main Chat Area -->
                    <div class="chat-container">
                        <div id="chat-box" class="chat-messages">
                            <!-- Messages injected by JS -->
                            <div style="text-align: center; color: var(--color-text-secondary); margin-top: 2rem;">
                                <span class="iconify" data-icon="lucide:message-square" style="font-size: 2rem; opacity: 0.5;"></span>
                                <p>游戏开始！请提问...</p>
                            </div>
                        </div>
                        <div class="chat-input-area">
                            <textarea id="user-input" rows="1" placeholder="输入你的问题 (支持 Enter 发送)..." style="flex: 1; resize: none;"></textarea>
                            <button class="btn btn-secondary" id="restore-story-btn" title="故事还原" style="padding: 0.5rem 0.8rem;">
                                <span class="iconify" data-icon="lucide:book-open-check"></span>
                            </button>
                            <button class="btn" id="send-btn">
                                <span class="iconify" data-icon="lucide:send"></span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right: Sidebar -->
                <div style="display: flex; flex-direction: column; gap: 1rem; height: 100%;" class="mobile-sidebar">
                    <!-- Mobile Toggle Button -->
                    <button class="btn btn-secondary mobile-sidebar-toggle" style="display: none; width: 100%; justify-content: center; font-size: 0.85rem; padding: 0.5rem;" onclick="toggleMobileSidebar()">
                        <span class="iconify" data-icon="lucide:chevrons-left"></span> 展开侧栏
                    </button>
                    <div class="mobile-sidebar-inner" style="display: flex; flex-direction: column; gap: 1rem; height: 100%;">
                    <!-- User List -->
                    <div class="user-list-panel" style="flex: 0 0 auto; max-height: 200px;">
                        <h4 style="margin-top: 0; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                            <span class="iconify" data-icon="lucide:users" style="color: var(--color-primary);"></span>
                            在线成员
                        </h4>
                        <div id="user-list">
                            <!-- Users injected by JS -->
                        </div>
                    </div>

                    <!-- Tools / Admin -->
                    <div class="user-list-panel" style="flex: 0 0 auto;">
                         <h4 style="margin-top: 0; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                            <span class="iconify" data-icon="lucide:wrench" style="color: var(--color-primary);"></span>
                            工具箱
                        </h4>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                             <!-- Story Ops (Admin only) -->
                             <div id="story-ops" style="display: none;">
                                <button class="btn btn-secondary" style="width: 100%; text-align: left; font-size: 0.9rem;" onclick="document.getElementById('upload-story-file').click()">
                                    <span class="iconify" data-icon="lucide:upload"></span> 上传题目
                                </button>
                                <input type="file" id="upload-story-file" accept=".json" style="display: none;" onchange="handleUploadStory(this)">
                                <button class="btn btn-secondary" style="width: 100%; text-align: left; font-size: 0.9rem; margin-top: 0.5rem;" onclick="showPlazaStorySelector()">
                                    <span class="iconify" data-icon="lucide:library"></span> 从广场选择
                                </button>
                             </div>
                             <button class="btn delete-btn" id="delete-room-btn" style="width: 100%; background: #fee2e2; color: #b91c1c; border: none; display: none;">
                                <span class="iconify" data-icon="lucide:trash-2"></span> 删除房间
                             </button>
                        </div>
                    </div>

                    <!-- Chat (No AI) -->
                     <div class="user-list-panel" style="flex: 1; display: flex; flex-direction: column; min-height: 200px;">
                        <h4 style="margin-top: 0; margin-bottom: 0.5rem;">房间群聊</h4>
                        <div id="chat-box-chat" style="flex: 1; overflow-y: auto; background: #f9fafb; border-radius: var(--radius-sm); padding: 0.5rem; font-size: 0.9rem; margin-bottom: 0.5rem; min-height: 100px;"></div>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="chat-input" placeholder="聊天..." style="flex: 1; font-size: 0.9rem; padding: 0.4rem;">
                            <button class="btn" id="chat-send-btn" style="padding: 0.4rem 0.8rem;">
                                <span class="iconify" data-icon="lucide:send"></span>
                            </button>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 故事还原弹窗 -->
    <div id="restore-modal" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.45); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
        <div style="background:#fff; border-radius:16px; box-shadow:0 20px 60px rgba(2,6,23,.18); padding:20px; width:92vw; max-width:500px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h3 style="margin:0; font-size:18px;">故事还原</h3>
                <button onclick="closeRestoreModal()" style="border:none; background:none; cursor:pointer; font-size:22px; color:#64748b;">×</button>
            </div>
            <div style="font-size:13px; color:#64748b; margin-bottom:10px;">请输入你对整个故事真相的推测，AI 将根据胜利条件进行判断。</div>
            <textarea id="restore-input" rows="6" placeholder="请输入你还原的故事内容..." style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; font-size:14px; resize:vertical; box-sizing:border-box;"></textarea>
            <div style="display:flex; gap:10px; margin-top:12px; justify-content:flex-end;">
                <button class="btn btn-secondary" onclick="closeRestoreModal()">取消</button>
                <button class="btn" id="restore-submit-btn">提交还原</button>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding: 2rem 0; color: #9ca3af; font-size: 0.9rem;">
        <a href="https://github.com/mumuhaha487/Turtle_Soup" target="_blank" style="color: inherit; text-decoration: none;">Turtle_Soup</a> 由 mumuhaha 构建 | <a href="https://beian.miit.gov.cn/" target="_blank" style="color: inherit; text-decoration: none;">赣ICP备2024038464号</a>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
    <script>
        // Additional Helper for Upload Story (since it wasn't in main.js fully or relies on ID)
        async function handleUploadStory(input) {
            if (!input.files[0]) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);
            formData.append('code', roomCode); // roomCode from main.js global scope
            formData.append('nickname', nickname);
            
            try {
                const res = await fetch('/api/upload_story', {method: 'POST', body: formData});
                const data = await res.json();
                if (data.success) {
                    (window.uiToast ? window.uiToast('上传成功','success') : alert('上传成功'));
                    fetchCurrentStory(); // from main.js
                } else {
                    (window.uiAlert ? window.uiAlert(data.error || '上传失败','上传失败') : alert(data.error || '上传失败'));
                }
            } catch(e) { (window.uiAlert ? window.uiAlert('网络错误','错误') : alert('网络错误')); }
            input.value = '';
        }
    </script>
</body>
</html>
