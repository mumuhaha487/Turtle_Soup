<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>故事广场 - 海龟汤</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 1px;
            overflow-x: auto;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn:hover {
            color: var(--color-primary);
        }
        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: var(--radius-md);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.open .modal-content {
            transform: scale(1);
        }
        /* Dropdown specific fix */
        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            margin-top: 4px;
        }
        .dropdown-item {
            padding: 0.75rem;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
        }
        .dropdown-item:hover {
            background-color: #f9fafb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="iconify" data-icon="lucide:library" style="color: var(--color-primary);"></span>
                <span>故事广场</span>
            </div>
            <nav>
                <a href="/" class="btn btn-secondary">
                    <span class="iconify" data-icon="lucide:arrow-left"></span> 返回首页
                </a>
            </nav>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('browse')">浏览故事</button>
            <button class="tab-btn" onclick="switchTab('create')">发布故事</button>
            <button class="tab-btn" onclick="switchTab('manage')">管理/编辑</button>
        </div>

        <!-- Browse Tab -->
        <div id="browse" class="tab-content active">
            <div class="form-group">
                <div style="position: relative;">
                    <span class="iconify" data-icon="lucide:search" style="position: absolute; left: 12px; top: 12px; color: #9ca3af;"></span>
                    <input type="text" id="browse-search" placeholder="搜索故事..." style="padding-left: 36px;" oninput="filterStories(this.value)">
                </div>
            </div>
            <div id="stories-grid" class="story-grid">
                <!-- Stories will be loaded here -->
                <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #9ca3af;">
                    <span class="iconify" data-icon="lucide:loader-2" style="animation: spin 1s linear infinite;"></span>
                    正在加载...
                </div>
            </div>
        </div>

        <!-- Create Tab -->
        <div id="create" class="tab-content">
            <div class="card">
                <h3><span class="iconify" data-icon="lucide:upload-cloud"></span> 上传 JSON 文件</h3>
                <form id="upload-form">
                    <div class="form-group">
                        <label>故事名称</label>
                        <input type="text" id="story-name" maxlength="32" required placeholder="给你的故事起个名字">
                    </div>
                    <div class="form-group">
                        <label>设置管理密码</label>
                        <input type="password" id="story-password" required placeholder="用于日后修改">
                    </div>
                    <div class="form-group">
                        <label>选择文件 (.json)</label>
                        <input type="file" id="story-file" accept=".json" required style="padding: 0.5rem 0;">
                    </div>
                    <button class="btn" type="submit">
                        <span class="iconify" data-icon="lucide:upload"></span> 上传发布
                    </button>
                    <div id="upload-result" style="margin-top: 1rem;"></div>
                </form>
            </div>

            <div class="card" style="margin-top: 2rem;">
                <h3><span class="iconify" data-icon="lucide:edit-3"></span> 在线创作</h3>
                <form id="online-form">
                    <div class="form-group">
                        <label>故事名称</label>
                        <input type="text" id="online-name" maxlength="32" required>
                    </div>
                    <div class="form-group">
                        <label>设置管理密码</label>
                        <input type="password" id="online-password" required>
                    </div>
                    <div class="form-group">
                        <label>汤面 (玩家看到的谜题)</label>
                        <textarea id="online-surface" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>汤底 (真相)</label>
                        <textarea id="online-answer" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>获胜条件</label>
                        <input type="text" id="online-victory" placeholder="例如：猜出凶手是谁" required>
                    </div>
                    <div class="form-group">
                        <label>给 AI 的补充说明 (可选)</label>
                        <input type="text" id="online-additional">
                    </div>
                    <button class="btn" type="submit">
                        <span class="iconify" data-icon="lucide:send"></span> 发布故事
                    </button>
                    <div id="online-result" style="margin-top: 1rem;"></div>
                </form>
            </div>
        </div>

        <!-- Manage Tab -->
        <div id="manage" class="tab-content">
            <div class="card">
                <h3><span class="iconify" data-icon="lucide:settings-2"></span> 修改故事</h3>
                <div class="form-group" style="position: relative;">
                    <label>搜索并选择故事</label>
                    <input type="text" id="edit-story-search" placeholder="输入名称或 ID..." autocomplete="off">
                    <div id="edit-story-dropdown" class="search-dropdown" style="display: none;"></div>
                </div>
                <div class="form-group">
                    <label>管理密码</label>
                    <input type="password" id="edit-story-password" placeholder="输入发布时设置的密码">
                </div>
                <button class="btn" id="edit-story-btn">加载内容</button>
                <div id="edit-story-result" style="margin-top: 1rem;"></div>

                <form id="edit-form" style="display:none; margin-top: 2rem; border-top: 1px solid #e5e7eb; padding-top: 1rem;">
                    <div class="form-group">
                        <label>汤面</label>
                        <textarea id="edit-surface" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>汤底</label>
                        <textarea id="edit-answer" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>获胜条件</label>
                        <input type="text" id="edit-victory">
                    </div>
                    <div class="form-group">
                        <label>补充说明</label>
                        <input type="text" id="edit-additional">
                    </div>
                    <button class="btn" type="submit">保存修改</button>
                </form>
            </div>
        </div>
        
        <div style="text-align: center; padding: 2rem 0; color: #9ca3af; font-size: 0.9rem;">
            <a href="https://github.com/mumuhaha487/Turtle_Soup" target="_blank" style="color: inherit; text-decoration: none;">Turtle_Soup</a> 由 mumuhaha 构建 | <a href="https://beian.miit.gov.cn/" target="_blank" style="color: inherit; text-decoration: none;">赣ICP备2024038464号</a>
        </div>
    </div>

    <!-- Start Game Modal -->
    <div id="start-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="margin: 0;">开始游戏</h3>
                <button onclick="closeStartModal()" style="background:none; border:none; cursor:pointer;">
                    <span class="iconify" data-icon="lucide:x" style="font-size: 1.5rem;"></span>
                </button>
            </div>
            
            <form id="start-form">
                <input type="hidden" id="start-story-filename">
                <div class="form-group">
                    <label>你的昵称</label>
                    <input type="text" id="start-nickname" required>
                </div>
                
                <details>
                    <summary style="cursor: pointer; color: var(--color-text-secondary); margin-bottom: 1rem;">API 设置 (默认已配置)</summary>
                    <div class="form-group">
                        <label>Base URL</label>
                        <input type="text" id="start-base-url" placeholder="默认">
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="start-api-key" placeholder="默认">
                    </div>
                    <div class="form-group">
                        <label>模型</label>
                        <select id="start-model-select" style="width: 100%;">
                            <option value="gpt-4o">gpt-4o</option>
                        </select>
                    </div>
                </details>

                <button class="btn" type="submit" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    <span class="iconify" data-icon="lucide:play"></span> 立即开始
                </button>
                <div id="start-result" style="margin-top: 1rem;"></div>
            </form>
        </div>
    </div>

    <script>
        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Global State
        let allStories = [];
        let selectedStoryId = '';
        let selectedStoryFilename = '';

        // Load Stories
        async function loadStories() {
            try {
                const response = await fetch('/api/get_plaza_stories');
                const data = await response.json();
                allStories = data.stories || [];
                renderStories(allStories);
            } catch (error) {
                console.error('Failed to load stories:', error);
                document.getElementById('stories-grid').innerHTML = '<p>加载失败，请刷新重试</p>';
            }
        }

        function renderStories(stories) {
            const grid = document.getElementById('stories-grid');
            if (stories.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #9ca3af; padding: 3rem;">暂无故事，快去发布一个吧！</div>';
                return;
            }
            
            grid.innerHTML = stories.map((story, index) => {
                // Generate a consistent random image based on story ID
                const seed = story.id ? story.id.replace(/\D/g, '') : index;
                const imgUrl = `https://picsum.photos/seed/${seed}/400/300`;
                
                return `
                <div class="card story-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column; margin-bottom: 0;">
                    <div style="height: 160px; overflow: hidden;">
                        <img src="${imgUrl}" alt="Cover" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s;">
                    </div>
                    <div style="padding: 1.5rem; flex: 1; display: flex; flex-direction: column;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                            <h3 style="font-size: 1.25rem; margin: 0;">${story.name || '未命名'}</h3>
                            <span style="font-size: 0.75rem; background: #f3f4f6; padding: 2px 6px; border-radius: 4px; color: #6b7280;">${story.id || '#'}</span>
                        </div>
                        <p style="font-size: 0.9rem; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                            ${story.surface || '暂无内容'}
                        </p>
                        <button class="btn" onclick="openStartModal('${story.filename}')" style="width: 100%; justify-content: center; margin-top: 1rem;">
                            <span class="iconify" data-icon="lucide:play-circle"></span> 开始挑战
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function filterStories(query) {
            const lower = query.toLowerCase();
            const filtered = allStories.filter(s => 
                (s.name && s.name.toLowerCase().includes(lower)) || 
                (s.surface && s.surface.toLowerCase().includes(lower)) ||
                (s.id && s.id.toLowerCase().includes(lower))
            );
            renderStories(filtered);
        }

        // Search Dropdown Logic for Edit
        const editSearchInput = document.getElementById('edit-story-search');
        const editDropdown = document.getElementById('edit-story-dropdown');
        
        editSearchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (!val) {
                editDropdown.style.display = 'none';
                return;
            }
            const matches = allStories.filter(s => 
                (s.name && s.name.toLowerCase().includes(val)) || 
                (s.id && s.id.includes(val))
            );
            
            if (matches.length) {
                editDropdown.innerHTML = matches.map(s => `
                    <div class="dropdown-item" onclick="selectEditStory('${s.id}', '${s.name}', '${s.filename}')">
                        <div style="font-weight: 600;">${s.name} <span style="font-weight: normal; color: #9ca3af; font-size: 0.8em;">${s.id}</span></div>
                    </div>
                `).join('');
                editDropdown.style.display = 'block';
            } else {
                editDropdown.innerHTML = '<div class="dropdown-item" style="cursor: default; color: #9ca3af;">无匹配结果</div>';
                editDropdown.style.display = 'block';
            }
        });

        function selectEditStory(id, name, filename) {
            editSearchInput.value = `${name} (${id})`;
            selectedStoryId = id;
            selectedStoryFilename = filename;
            editDropdown.style.display = 'none';
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!editSearchInput.contains(e.target) && !editDropdown.contains(e.target)) {
                editDropdown.style.display = 'none';
            }
        });

        // Edit Load
        document.getElementById('edit-story-btn').onclick = async () => {
            if (!selectedStoryId) return alert('请先选择故事');
            const password = document.getElementById('edit-story-password').value;
            if (!password) return alert('请输入密码');
            
            try {
                const res = await fetch('/api/get_story_for_edit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({story_id: selectedStoryId, password})
                });
                const data = await res.json();
                if (data.success) {
                    const s = data.story;
                    document.getElementById('edit-surface').value = s.surface || '';
                    document.getElementById('edit-answer').value = s.answer || '';
                    document.getElementById('edit-victory').value = s.victory_condition || '';
                    document.getElementById('edit-additional').value = s.additional || '';
                    document.getElementById('edit-form').style.display = 'block';
                    document.getElementById('edit-story-result').innerHTML = '';
                } else {
                    alert(data.error || '加载失败');
                }
            } catch(e) { alert('网络错误'); }
        };

        // Edit Submit
        document.getElementById('edit-form').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/edit_story', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        story_id: selectedStoryId,
                        password: document.getElementById('edit-story-password').value,
                        surface: document.getElementById('edit-surface').value,
                        answer: document.getElementById('edit-answer').value,
                        victory_condition: document.getElementById('edit-victory').value,
                        additional: document.getElementById('edit-additional').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert('修改成功');
                    loadStories();
                } else {
                    alert(data.error || '修改失败');
                }
            } catch(e) { alert('网络错误'); }
        };

        // Upload Form
        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('story-name').value);
            formData.append('password', document.getElementById('story-password').value);
            formData.append('file', document.getElementById('story-file').files[0]);
            
            try {
                const res = await fetch('/api/upload_to_plaza', {method: 'POST', body: formData});
                const data = await res.json();
                if (data.success) {
                    alert('上传成功');
                    document.getElementById('upload-form').reset();
                    loadStories();
                    switchTab('browse');
                } else {
                    alert(data.error || '上传失败');
                }
            } catch(e) { alert('网络错误'); }
        };

        // Online Form
        document.getElementById('online-form').onsubmit = async (e) => {
            e.preventDefault();
            const body = {
                name: document.getElementById('online-name').value,
                password: document.getElementById('online-password').value,
                surface: document.getElementById('online-surface').value,
                answer: document.getElementById('online-answer').value,
                victory_condition: document.getElementById('online-victory').value,
                additional: document.getElementById('online-additional').value
            };
            try {
                const res = await fetch('/api/submit_story_online', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    alert('发布成功');
                    document.getElementById('online-form').reset();
                    loadStories();
                    switchTab('browse');
                } else {
                    alert(data.error || '发布失败');
                }
            } catch(e) { alert('网络错误'); }
        };

        // Modal Logic
        function openStartModal(filename) {
            document.getElementById('start-story-filename').value = filename;
            document.getElementById('start-modal').classList.add('open');
            // Init options if needed
            initPlazaOptions();
        }
        function closeStartModal() {
            document.getElementById('start-modal').classList.remove('open');
        }

        async function initPlazaOptions() {
            try {
                const resp = await fetch('/api/get_options');
                const data = await resp.json();
                const select = document.getElementById('start-model-select');
                if (data.options && data.options.models) {
                    select.innerHTML = data.options.models.map(m => `<option value="${m}">${m}</option>`).join('');
                }
            } catch(e) {}
        }

        document.getElementById('start-form').onsubmit = async (e) => {
            e.preventDefault();
            const nickname = document.getElementById('start-nickname').value;
            // Use defaults if empty, logic similar to original but simplified for UX
            // Here assuming backend handles defaults or we pass empty if not provided?
            // Original code used dropdowns OR inputs.
            // Simplified: Just use input values, or defaults if implemented in backend/frontend.
            // For now, let's keep it simple:
            const baseUrl = document.getElementById('start-base-url').value || 'http://api.0ha.top/v1'; 
            const apiKey = document.getElementById('start-api-key').value; // if empty, maybe backend fails?
            const model = document.getElementById('start-model-select').value;
            
            if (!nickname) return alert('请输入昵称');

            try {
                // 1. Create Room
                const res = await fetch('/api/create_room', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nickname, base_url: baseUrl, api_key: apiKey || 'sk-xxx', model}) // Placeholder key if empty
                });
                const data = await res.json();
                if (!data.room_code) throw new Error(data.error || '创建房间失败');

                // 2. Load Story
                const res2 = await fetch('/api/load_story_from_plaza', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: data.room_code, nickname, filename: document.getElementById('start-story-filename').value})
                });
                const data2 = await res2.json();
                if (!data2.success) throw new Error(data2.error || '加载故事失败');

                // 3. Redirect
                localStorage.setItem('haigui_room', JSON.stringify({roomCode: data.room_code, nickname, isOwner: true}));
                window.location.href = '/'; // Or /room/code? 
                // Original redirected to / or used localStorage to resume. 
                // Wait, original said `window.location.href = '/'`. I'll follow that.
            } catch(err) {
                alert(err.message);
            }
        };

        // Init
        loadStories();
    </script>
</body>
</html>
