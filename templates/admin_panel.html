<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员后台 - 海龟汤</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        .admin-section {
            margin-bottom: 2rem;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .stat-icon {
            font-size: 2rem;
            color: var(--color-primary);
            background: rgba(5, 150, 105, 0.1);
            padding: 0.75rem;
            border-radius: var(--radius-sm);
        }
        textarea.code-editor {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <div class="logo">
                <span class="iconify" data-icon="lucide:shield-check" style="color: var(--color-primary);"></span>
                <span>管理控制台</span>
            </div>
            <nav>
                <a href="/" class="btn btn-secondary">
                    <span class="iconify" data-icon="lucide:log-out"></span> 退出后台
                </a>
            </nav>
        </header>

        <!-- Stats Overview -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-icon"><span class="iconify" data-icon="lucide:home"></span></div>
                <div>
                    <div style="font-size: 0.9rem; color: var(--color-text-secondary);">活跃房间</div>
                    <div style="font-size: 1.5rem; font-weight: 700;">{{ rooms|length }}</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><span class="iconify" data-icon="lucide:book-open"></span></div>
                <div>
                    <div style="font-size: 0.9rem; color: var(--color-text-secondary);">故事库</div>
                    <div style="font-size: 1.5rem; font-weight: 700;" id="total-stories-count">-</div>
                </div>
            </div>
        </div>

        <div class="card admin-section">
            <h3><span class="iconify" data-icon="lucide:monitor"></span> 房间管理</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>房间码</th>
                            <th>房主</th>
                            <th>成员</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for room in rooms %}
                        <tr>
                            <td><span style="font-family: monospace; font-weight: 700; background: #f3f4f6; padding: 2px 6px; border-radius: 4px;">{{ room.code }}</span></td>
                            <td>{{ room.owner }}</td>
                            <td>{{ room.members|join(', ') }}</td>
                            <td>
                                <button class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;" onclick="deleteRoom('{{ room.code }}')">
                                    <span class="iconify" data-icon="lucide:trash-2"></span> 强制关闭
                                </button>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--color-text-secondary); padding: 2rem;">
                                暂无活跃房间
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card admin-section">
            <h3><span class="iconify" data-icon="lucide:library"></span> 故事管理</h3>
            
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div style="position: relative; flex: 1;">
                    <span class="iconify" data-icon="lucide:search" style="position: absolute; left: 12px; top: 12px; color: #9ca3af;"></span>
                    <input type="text" id="released-search" placeholder="搜索名称、ID..." style="padding-left: 36px;">
                </div>
                <button class="btn btn-secondary" id="released-refresh">
                    <span class="iconify" data-icon="lucide:refresh-cw"></span> 刷新
                </button>
            </div>

            <div style="max-height: 400px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: var(--radius-sm);">
                <table id="released-stories-table" style="margin: 0;">
                    <thead>
                        <tr>
                            <th style="position: sticky; top: 0; z-index: 10;">故事名称</th>
                            <th style="position: sticky; top: 0; z-index: 10;">ID</th>
                            <th style="position: sticky; top: 0; z-index: 10;">文件名</th>
                            <th style="position: sticky; top: 0; z-index: 10;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card admin-section">
            <h3><span class="iconify" data-icon="lucide:settings"></span> 全局配置</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                <div class="form-group">
                    <label>模型列表 (每行一个)</label>
                    <textarea id="opt-models" rows="6" class="code-editor" placeholder="gpt-4o..."></textarea>
                </div>
                <div class="form-group">
                    <label>代理地址 (每行一个)</label>
                    <textarea id="opt-base-urls" rows="6" class="code-editor" placeholder="https://..."></textarea>
                </div>
                <div class="form-group">
                    <label>API Keys (每行一个, 可选)</label>
                    <textarea id="opt-api-keys" rows="6" class="code-editor" placeholder="sk-..."></textarea>
                </div>
            </div>
            <button class="btn" onclick="saveOptions()">
                <span class="iconify" data-icon="lucide:save"></span> 保存配置
            </button>
            <span id="opt-result" style="margin-left: 1rem; color: var(--color-text-secondary);"></span>
        </div>

        <div class="card admin-section">
            <h3><span class="iconify" data-icon="lucide:megaphone"></span> 系统公告</h3>
            <div class="form-group">
                <textarea id="ann-content" rows="4" placeholder="输入首页公告内容..."></textarea>
            </div>
            <button class="btn" onclick="saveAnnouncements()">
                <span class="iconify" data-icon="lucide:save"></span> 发布公告
            </button>
            <span id="ann-result" style="margin-left: 1rem; color: var(--color-text-secondary);"></span>
        </div>
        
        <div style="text-align: center; padding: 2rem 0; color: #9ca3af; font-size: 0.9rem;">
            <a href="https://github.com/mumuhaha487/Turtle_Soup" target="_blank" style="color: inherit; text-decoration: none;">Turtle_Soup</a> 由 mumuhaha 构建 | <a href="https://beian.miit.gov.cn/" target="_blank" style="color: inherit; text-decoration: none;">赣ICP备2024038464号</a>
        </div>
    </div>

    <script>
        // --- Room Management ---
        function deleteRoom(code) {
            if (!confirm('确定要强制关闭该房间吗？玩家将被踢出。')) return;
            fetch('/admin/delete_room', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'code=' + encodeURIComponent(code)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    location.reload();
                } else {
                    alert('操作失败：' + (data.error || '未知错误'));
                }
            })
            .catch(() => alert('网络错误'));
        }

        // --- Story Management ---
        let releasedCache = [];
        async function loadReleasedStories() {
            try {
                const response = await fetch('/api/get_plaza_stories');
                const data = await response.json();
                releasedCache = data.stories || [];
                document.getElementById('total-stories-count').textContent = releasedCache.length;
                renderStories(releasedCache);
            } catch (error) {
                console.error('Failed to load stories:', error);
            }
        }

        function renderStories(list) {
            const tbody = document.querySelector('#released-stories-table tbody');
            tbody.innerHTML = '';
            
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;color:#9ca3af;">暂无数据</td></tr>`;
                return;
            }

            list.forEach(story => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${story.name || '无名称'}</td>
                    <td><span style="font-family:monospace;font-size:0.9em;color:#6b7280;">${story.id || ''}</span></td>
                    <td style="font-family:monospace;font-size:0.8em;color:#6b7280;">${story.filename || ''}</td>
                    <td>
                        <button class="btn btn-danger" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="deleteReleased('${story.filename}')">
                            <span class="iconify" data-icon="lucide:trash-2"></span> 删除
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('released-search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = releasedCache.filter(s => 
                (s.name || '').toLowerCase().includes(val) || 
                (s.id || '').toLowerCase().includes(val) ||
                (s.filename || '').toLowerCase().includes(val)
            );
            renderStories(filtered);
        });

        document.getElementById('released-refresh').onclick = loadReleasedStories;

        function deleteReleased(filename) {
            if (!confirm('确定要永久删除这个故事吗？')) return;
            const formData = new FormData();
            formData.append('filename', filename);
            fetch('/api/delete_released_story', {
                method: 'POST',
                body: formData
            }).then(r => r.json()).then(d => {
                if (d.success) {
                    loadReleasedStories();
                } else {
                    alert('删除失败：' + (d.error || '未知错误'));
                }
            }).catch(() => alert('网络错误'));
        }

        // --- Options & Announcements ---
        async function loadOptions() {
            try {
                const resp = await fetch('/api/get_options');
                const data = await resp.json();
                const opt = data.options || {};
                document.getElementById('opt-models').value = (opt.models || []).join('\n');
                document.getElementById('opt-base-urls').value = (opt.base_urls || []).join('\n');
                document.getElementById('opt-api-keys').value = (opt.api_keys || []).join('\n');
            } catch (e) {}
        }

        async function saveOptions() {
            const toList = (val) => val.split(/\n+/).map(x => x.trim()).filter(Boolean);
            const body = {
                models: toList(document.getElementById('opt-models').value),
                base_urls: toList(document.getElementById('opt-base-urls').value),
                api_keys: toList(document.getElementById('opt-api-keys').value)
            };
            
            try {
                const resp = await fetch('/api/save_options', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                const data = await resp.json();
                const resultSpan = document.getElementById('opt-result');
                resultSpan.textContent = data.success ? '保存成功' : '保存失败';
                resultSpan.style.color = data.success ? 'var(--color-primary)' : 'var(--color-danger)';
                setTimeout(() => resultSpan.textContent = '', 3000);
            } catch (e) { alert('网络错误'); }
        }

        async function loadAnnouncements() {
            try {
                const resp = await fetch('/api/get_announcements');
                const data = await resp.json();
                document.getElementById('ann-content').value = data.content || '';
            } catch (e) {}
        }

        async function saveAnnouncements() {
            try {
                const resp = await fetch('/api/save_announcements', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: document.getElementById('ann-content').value})
                });
                const data = await resp.json();
                const resultSpan = document.getElementById('ann-result');
                resultSpan.textContent = data.success ? '发布成功' : '发布失败';
                resultSpan.style.color = data.success ? 'var(--color-primary)' : 'var(--color-danger)';
                setTimeout(() => resultSpan.textContent = '', 3000);
            } catch (e) { alert('网络错误'); }
        }

        // Init
        loadReleasedStories();
        loadOptions();
        loadAnnouncements();
    </script>
</body>
</html>
