<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员登录 - 海龟汤</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        body {
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container login-card">
        <div class="card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <span class="iconify" data-icon="lucide:shield-check" style="font-size: 3rem; color: var(--color-primary);"></span>
                <h2>管理员登录</h2>
            </div>
            
            {% if error %}
            <div style="background: #fee2e2; color: #b91c1c; padding: 0.75rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <span class="iconify" data-icon="lucide:alert-circle"></span>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>用户名</label>
                    <div style="position: relative;">
                        <span class="iconify" data-icon="lucide:user" style="position: absolute; left: 12px; top: 12px; color: #9ca3af;"></span>
                        <input type="text" name="username" required style="padding-left: 36px;">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div style="position: relative;">
                        <span class="iconify" data-icon="lucide:lock" style="position: absolute; left: 12px; top: 12px; color: #9ca3af;"></span>
                        <input type="password" name="password" required style="padding-left: 36px;">
                    </div>
                </div>
                <button type="submit" class="btn" style="width: 100%; justify-content: center;">
                    登录后台
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/" style="color: var(--color-text-secondary); text-decoration: none; font-size: 0.9rem;">
                    <span class="iconify" data-icon="lucide:arrow-left" style="vertical-align: -2px;"></span> 返回首页
                </a>
            </div>
        </div>
        <div style="text-align: center; padding: 2rem 0; color: #9ca3af; font-size: 0.9rem;">
            <a href="https://github.com/mumuhaha487/Turtle_Soup" target="_blank" style="color: inherit; text-decoration: none;">Turtle_Soup</a> 由 mumuhaha 构建 | <a href="https://beian.miit.gov.cn/" target="_blank" style="color: inherit; text-decoration: none;">赣ICP备2024038464号</a>
        </div>
    </div>
</body>
</html>
